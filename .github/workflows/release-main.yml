name: Build OpsCLI Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-opscli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: opscli-linux
          - os: macos-latest
            artifact_name: opscli-macos
          - os: windows-latest
            artifact_name: opscli-windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build self-contained OpsCLI executable
        run: npm run --workspace @orgops/opscli build:release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/opscli-*

  publish-release:
    runs-on: ubuntu-latest
    needs: build-opscli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute semver+date release tag
        id: version
        run: |
          set -euo pipefail
          git fetch --tags --force

          last_tag="$(
            git tag --list \
              | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
              | sort -V \
              | sed -n '$p'
          )"

          if [ -z "${last_tag}" ]; then
            semver="0.0.1"
          else
            base_version="${last_tag%%-*}"
            IFS='.' read -r major minor patch <<< "${base_version}"
            semver="${major}.${minor}.$((patch + 1))"
          fi

          release_date="$(date -u +%Y-%m-%d)"
          release_tag="${semver}-${release_date}"

          echo "previous_tag=${last_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "release_title=OrgOps ${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Build release changelog notes
        id: changelog
        env:
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          {
            echo "# Release ${RELEASE_TAG}"
            echo
            echo "## Changelog"
            echo
          } > RELEASE_CHANGELOG.md

          if [ -n "${PREVIOUS_TAG}" ]; then
            commit_lines="$(git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..HEAD")"
          else
            commit_lines="$(git log --pretty=format:'- %s (%h)')"
          fi

          if [ -z "${commit_lines}" ]; then
            echo "- No code changes since previous release." >> RELEASE_CHANGELOG.md
          else
            echo "${commit_lines}" >> RELEASE_CHANGELOG.md
          fi

          echo >> RELEASE_CHANGELOG.md
          echo "Generated on $(date -u '+%Y-%m-%d %H:%M:%S UTC')." >> RELEASE_CHANGELOG.md

          changelog_asset="CHANGELOG-${RELEASE_TAG}.md"
          cp RELEASE_CHANGELOG.md "dist/${changelog_asset}"
          echo "changelog_asset=dist/${changelog_asset}" >> "${GITHUB_OUTPUT}"

      - name: Publish versioned rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.version.outputs.release_title }}
          CHANGELOG_ASSET: ${{ steps.changelog.outputs.changelog_asset }}
        run: |
          set -euo pipefail
          ls -R dist

          artifacts=(dist/*/opscli-*)
          if [ "${#artifacts[@]}" -eq 0 ] || [ ! -e "${artifacts[0]}" ]; then
            echo "No OpsCLI artifacts found under dist/*/opscli-*"
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${{ github.repository }}" \
              --title "${RELEASE_TITLE}" \
              --notes-file RELEASE_CHANGELOG.md

            gh release upload "${RELEASE_TAG}" "${artifacts[@]}" "${CHANGELOG_ASSET}" \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" "${artifacts[@]}" "${CHANGELOG_ASSET}" \
              --repo "${{ github.repository }}" \
              --title "${RELEASE_TITLE}" \
              --notes-file RELEASE_CHANGELOG.md
          fi
