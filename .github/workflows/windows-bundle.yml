name: Build Windows Bundle

on:
  workflow_dispatch:

jobs:
  bundle:
    name: Bundle for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build bundle
        shell: pwsh
        run: ./scripts/bundle-windows.ps1 -OutputDir dist

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: orgops-windows-bundle
          path: dist/orgops-windows-bundle.zip
          if-no-files-found: error
